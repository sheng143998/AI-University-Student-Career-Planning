server:
  port: 8081

spring:
  profiles:
    active: dev
  application:
    name: fuchuang
  datasource:
    driver-class-name: ${fuchuang.datasource.driver-class-name}
    url: jdbc:mysql://${fuchuang.datasource.host}:${fuchuang.datasource.port}/${fuchuang.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${fuchuang.datasource.username}
    password: ${fuchuang.datasource.password}
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: qwen-max-latest

mybatis:
  # mapper 配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.itsheng.pojo.entity
  configuration:
    # 开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework.ai.chat.client.advisor: debug
    com.itsheng.service: debug

fuchuang:
  jwt:
    # jwt 签名密钥（至少32字符，满足HS256的256bits要求）
    secret: itsheng2024fuchuangaiuniversitysecretkey
    # jwt 过期时间
    ttl: 72000000000000000
    # 令牌名称
    tokenName: token
